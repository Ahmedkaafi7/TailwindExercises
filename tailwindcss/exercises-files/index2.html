<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    <div class="grid col-3 gap-4">
        <div class="bg-cyan-700 p-8 col-span-3">
            <h3 class="text-white font-extrabold capitalize">featured content</h3>
            <p>this spans across all three col</p>
        </div>
        <div class=" bg-blue-700 p-8 col-span-2">
            <h3 class="text-white font-extrabold capitalize">left section</h3>
            <p>takes up 2 col</p>
        </div>
        <div class="bg-pink-700 p-8 ">
            <h3 class="text-white font-extrabold capitalize">right section</h3>
            <p>takes 1 col</p>
        </div>
        <div class="bg-pink-700 p-8">
            <h3 class="text-white font-extrabold capitalize">col 1</h3>
            <p>equal width</p>
    
        </div>
        <div class="bg-blue-700 p-8">
            <h3 class="text-white font-extrabold capitalize">col 2</h3>
            <p>equal width</p>
        </div>
        <div class="bg-cyan-700 p-8">
            <h3 class="text-white font-extrabold capitalize">col 3</h3>
            <p>equal width</p>
        </div>
    </div>
    </div>
    </div>
    </div>
    </div>
    </div>
</body>
</html>
