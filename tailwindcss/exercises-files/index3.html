<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid-rows</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    <div class=" grid grid-cols-3 gap-4 p-2 grid-rows-3">
        <div class="bg-cyan-700 p-8 row-span-2 col-span-2 ">
            <h3 class="text-white font-extrabold capitalize">image-1</h3>
            <p>this spans across all three col</p>
        </div>
        <div class=" bg-blue-700 p-8 ">
            <h3 class="text-white font-extrabold capitalize">image-2</h3>
            <p>takes up 2 col</p>
        </div>
        <div class="bg-pink-700 p-8 ">
            <h3 class="text-white font-extrabold capitalize">image-3</h3>
            <p>takes 1 col</p>
        </div>
        <div class="bg-pink-700 p-8">
            <h3 class="text-white font-extrabold capitalize">image-4</h3>
            <p>equal width</p>
    
        </div>
        <div class="bg-blue-700 p-8">
            <h3 class="text-white font-extrabold capitalize">image-5</h3>
            <p>equal width</p>
        </div>
        <div class="bg-cyan-700 p-8">
            <h3 class="text-white font-extrabold capitalize">image-6</h3>
            <p>equal width</p>
        </div>
    </div>
    </div>
    </div>
    </div>
    </div>
    </div>
</body>
</html>
